<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #f8f9fa);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            align-items: center;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .header h2 {
            margin: 0;
            color: #333;
            flex-grow: 1;
            text-align: center;
        }

        .logo {
            flex-shrink: 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #444;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: border 0.3s;
        }

        .form-group input:focus {
            border-color: #007bff;
        }

        .hint {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
    
        }

        .login-btn:hover {
            background: #0056b3;
        }

    .btn-link {
        display: inline-block;
        padding: 8px 16px;
        background-color: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 4px;
        border: none;
        font-size: 14px;
        transition: background-color 0.3s;
    }
    
    .btn-link:hover {
        background-color: #0056b3;
        text-decoration: none;
    }
    
    /* Outline button style */
    .btn-outline {
        background-color: transparent;
        color: #007bff;
        border: 2px solid #007bff;
    }
    
    .btn-outline:hover {
        background-color: #007bff;
        color: white;
    }
    </style>
    
</head>
